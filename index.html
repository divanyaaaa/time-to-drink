<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME TO DRINK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .header {
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .streak-badge {
            background: var(--tg-theme-secondary-bg-color, #f0f2f5);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: var(--tg-theme-button-color, #3498db);
            cursor: pointer;
        }

        /* Календарь */
        .calendar {
            display: flex;
            justify-content: space-between;
            width: 92%;
            margin: 10px 0 25px;
            gap: 6px;
        }

        .day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            font-size: 11px;
            padding: 10px 0;
            border-radius: 15px;
            background: var(--tg-theme-secondary-bg-color, #f0f2f5);
            color: var(--tg-theme-hint-color, #999);
            transition: all 0.3s ease;
        }

        .day-item.active { border: 1.5px solid var(--tg-theme-button-color, #3498db); color: var(--tg-theme-text-color); }
        .day-item.completed { background: #2ecc71; color: white; }
        .day-item b { font-size: 14px; margin: 2px 0; }

        /* КОЛЬЦЕВОЙ ПРОГРЕСС */
        .progress-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
            border-radius: 50%;
            /* Градиент, который мы будем менять через JS */
            background: conic-gradient(var(--tg-theme-button-color, #3498db) 0deg, var(--tg-theme-secondary-bg-color, #f0f2f5) 0deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
        }

        /* Белая середина круга */
        .progress-container::before {
            content: "";
            position: absolute;
            width: 190px;
            height: 190px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 50%;
        }

        .progress-content {
            position: relative;
            text-align: center;
            z-index: 1;
        }

        #counter { font-size: 42px; font-weight: 900; margin: 0; color: var(--tg-theme-text-color); }
        #percent-label { font-size: 16px; font-weight: bold; color: var(--tg-theme-button-color, #3498db); margin: 0; }
        #goal-label { font-size: 13px; color: var(--tg-theme-hint-color, #999); margin-top: 5px; }

        /* Кнопки */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            margin-top: 30px;
        }

        .btn-main {
            background-color: var(--tg-theme-button-color, #3498db);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-main:active { transform: scale(0.96); }

        /* Скрытые настройки */
        #settings-screen {
            position: fixed;
            inset: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            padding: 25px;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0 25px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-secondary-bg-color, #ccc);
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color);
            font-size: 16px;
        }

        .save-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="icon-btn" onclick="toggleSettings(true)">⚙️</button>
        <div class="streak-badge">
            <span id="streak-count">0</span> 🔥
        </div>
        <button class="icon-btn" onclick="resetToday()">🔄</button>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="main-card">
        <div class="progress-container" id="progress-circle">
            <div class="progress-content">
                <p id="percent-label">0%</p>
                <p id="counter">0</p>
                <p id="goal-label">из 2000 мл</p>
            </div>
        </div>

        <div class="btn-grid">
            <button class="btn-main" onclick="addWater(250)">+ 250 мл</button>
            <button class="btn-main" onclick="addWater(500)">+ 500 мл</button>
        </div>
    </div>

    <div id="settings-screen">
        <h2 style="margin-top:0">Настройки</h2>
        <label>Ваш вес (кг):</label>
        <input type="number" id="weight-input" placeholder="Например: 70">
        <label>Пол:</label>
        <select id="gender-input">
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
        </select>
        <button class="save-btn" onclick="saveSettings()">СОХРАНИТЬ</button>
        <button style="margin-top:20px; background:none; border:none; color:var(--tg-theme-hint-color);" onclick="toggleSettings(false)">Отмена</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            count: 0,
            goal: 2000,
            history: {},
            streak: 0,
            lastDate: new Date().toLocaleDateString('en-CA')
        };

        function loadData() {
            const saved = localStorage.getItem('water_tracker_v3');
            if (saved) state = JSON.parse(saved);
            checkNewDay();
            updateUI();
        }

        function saveData() {
            localStorage.setItem('water_tracker_v3', JSON.stringify(state));
        }

        function checkNewDay() {
            const today = new Date().toLocaleDateString('en-CA');
            if (state.lastDate !== today) {
                state.history[state.lastDate] = state.count;
                state.count = 0;
                state.lastDate = today;
                calculateStreak();
                saveData();
            }
        }

        function calculateStreak() {
            let streak = 0;
            let d = new Date();
            d.setDate(d.getDate() - 1);
            while(true) {
                let s = d.toLocaleDateString('en-CA');
                if(state.history[s] >= state.goal) { streak++; d.setDate(d.getDate()-1); }
                else break;
            }
            state.streak = streak;
        }

        function updateUI() {
            const percent = Math.min(Math.floor((state.count / state.goal) * 100), 100);
            
            // Обновляем текст
            document.getElementById('counter').innerText = state.count;
            document.getElementById('percent-label').innerText = percent + "%";
            document.getElementById('goal-label').innerText = "из " + state.goal + " мл";
            document.getElementById('streak-count').innerText = state.streak + (state.count >= state.goal ? 1 : 0);

            // Обновляем круговой прогресс
            const deg = percent * 3.6; // 100% = 360 градусов
            const circle = document.getElementById('progress-circle');
            const activeColor = getComputedStyle(document.body).getPropertyValue('--tg-theme-button-color') || '#3498db';
            const inactiveColor = getComputedStyle(document.body).getPropertyValue('--tg-theme-secondary-bg-color') || '#f0f2f5';
            
            circle.style.background = `conic-gradient(${activeColor} ${deg}deg, ${inactiveColor} 0deg)`;

            renderCalendar();
        }

        function addWater(ml) {
            state.count += ml;
            if (state.count >= state.goal && (state.count - ml) < state.goal) {
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.impactOccurred('light');
            }
            saveData();
            updateUI();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar');
            container.innerHTML = "";
            const daysShort = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toLocaleDateString('en-CA');
                const isToday = i === 0;
                const val = isToday ? state.count : (state.history[dateStr] || 0);
                const isDone = val >= state.goal;

                const dayDiv = document.createElement('div');
                dayDiv.className = `day-item ${isToday ? 'active' : ''} ${isDone ? 'completed' : ''}`;
                dayDiv.innerHTML = `
                    <span>${daysShort[d.getDay()]}</span>
                    <b>${d.getDate()}</b>
                    <span>${isDone ? '✅' : ''}</span>
                `;
                container.appendChild(dayDiv);
            }
        }

        function toggleSettings(show) { document.getElementById('settings-screen').style.display = show ? 'flex' : 'none'; }

        function saveSettings() {
            const w = document.getElementById('weight-input').value;
            if (w > 0) {
                state.goal = w * 35;
                saveData();
                updateUI();
                toggleSettings(false);
            }
        }

        function resetToday() {
            if(confirm("Сбросить сегодня?")) { state.count = 0; saveData(); updateUI(); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
