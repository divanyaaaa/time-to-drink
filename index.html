<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME TO DRINK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --main-blue: #3498db;
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f0f2f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .icon-btn {
            background: var(--sec-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Прогресс-бар */
        .progress-container {
            width: 85%;
            height: 30px;
            background: var(--sec-bg);
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0,0,0,0.1);
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.5s ease-out;
        }

        .stats {
            text-align: center;
            margin-bottom: 30px;
        }

        .stats h1 { font-size: 48px; margin: 10px 0; color: var(--main-blue); }
        .stats p { color: gray; margin: 0; }

        /* Кнопки */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 85%;
        }

        .btn-add {
            background: var(--main-blue);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .btn-add:active { transform: scale(0.95); }

        /* Настройки */
        #settings-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .input-group { margin-top: 20px; }
        input, select {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            background: var(--sec-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .save-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            margin-top: auto;
            margin-bottom: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="icon-btn" onclick="toggleSettings(true)">⚙️</button>
        <button class="icon-btn" onclick="resetWater()">🔄</button>
    </div>

    <div class="stats">
        <p>Выпито сегодня</p>
        <h1 id="counter">0 мл</h1>
        <p id="goal-text">Цель: 2000 мл</p>
    </div>

    <div class="progress-container">
        <div id="progress-fill"></div>
    </div>

    <div class="controls">
        <button class="btn-add" onclick="addWater(250)">+ 250 мл</button>
        <button class="btn-add" onclick="addWater(500)">+ 500 мл</button>
    </div>

    <!-- Настройки -->
    <div id="settings-screen">
        <h2>Мои данные</h2>
        <div class="input-group">
            <label>Ваш вес (кг)</label>
            <input type="number" id="weight-input" placeholder="70">
        </div>
        <div class="input-group">
            <label>Пол</label>
            <select id="gender-input">
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
            </select>
        </div>
        <button class="save-btn" onclick="saveSettings()">СОХРАНИТЬ</button>
        <button style="background:none; border:none; color:gray;" onclick="toggleSettings(false)">Отмена</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let count = parseInt(localStorage.getItem('water_count')) || 0;
        let goal = parseInt(localStorage.getItem('water_goal')) || 2000;

        function updateUI() {
            document.getElementById('counter').innerText = count + ' мл';
            document.getElementById('goal-text').innerText = 'Цель: ' + goal + ' мл';
            
            // Считаем % прогресса
            let percent = (count / goal) * 100;
            if (percent > 100) percent = 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            
            localStorage.setItem('water_count', count);
        }

        function addWater(ml) {
            count += ml;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function resetWater() {
            if(confirm("Сбросить прогресс?")) {
                count = 0;
                updateUI();
            }
        }

        function toggleSettings(show) {
            document.getElementById('settings-screen').style.display = show ? 'flex' : 'none';
        }

        function saveSettings() {
            const w = document.getElementById('weight-input').value;
            if(w > 0) {
                goal = w * 35;
                localStorage.setItem('water_goal', goal);
                localStorage.setItem('user_weight', w);
                updateUI();
                toggleSettings(false);
            }
        }

        // Инициализация
        window.onload = () => {
            document.getElementById('weight-input').value = localStorage.getItem('user_weight') || '';
            updateUI();
        };
    </script>
</body>
</html>
